<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="icon" type="image/png" href="hotel-ixmiquilpan.png">
    <title>Hotel Dios Padre | Login</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <main class="login">
      <form id="loginForm" class="card">
        <!-- 1. Aquí agregamos la imagen arriba del título -->
        <img src="hotel-ixmiquilpan.png" alt="Logo Hotel" class="card-logo" />

        <h2>Iniciar sesión</h2>

        <label>
          Tipo de acceso
          <select id="tipo">
            <option value="Administrador">Administrador</option>
            <option value="Camarista">Camarista</option>
            <option value="Taquilla">Taquilla</option>
          </select>
        </label>

        <label>
          Usuario
          <input id="usuario" required autocomplete="username" />
        </label>

        <label>
          Contraseña
          <input
            id="password"
            type="password"
            required
            autocomplete="current-password"
          />
        </label>

        <button>Entrar</button>
        <p id="error"></p>
      </form>
    </main>
    <script src="app.js"></script>
  </body>
</html>
